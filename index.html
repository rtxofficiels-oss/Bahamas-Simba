<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAHAMAS CLUB - Vice City Nights</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00ffff;
            --neon-yellow: #ffff00;
            --neon-purple: #8338ec;
            --bg-dark: #0a0a0a;
            --bg-card: rgba(255, 0, 255, 0.1);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark);
            color: #fff;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* NEON GLOW */
        .neon-glow {
            animation: neonPulse 2s ease-in-out infinite alternate;
            text-shadow: 0 0 5px currentColor, 0 0 10px currentColor, 0 0 20px currentColor;
        }

        @keyframes neonPulse {
            from { 
                filter: drop-shadow(0 0 5px currentColor);
                text-shadow: 0 0 5px currentColor, 0 0 10px currentColor, 0 0 20px currentColor;
            }
            to { 
                filter: drop-shadow(0 0 20px currentColor);
                text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 40px currentColor;
            }
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            padding: 1rem 0;
            border-bottom: 2px solid transparent;
            background-image: linear-gradient(var(--neon-pink), var(--neon-cyan));
            background-size: 0 2px;
            background-repeat: no-repeat;
            background-position: bottom;
            transition: all 0.3s ease;
        }

        header.scrolled {
            background-size: 100% 2px;
        }

        nav {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-cyan), var(--neon-yellow));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            position: relative;
            transition: all 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-cyan));
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--neon-pink);
        }

        .nav-links a:hover {
            color: var(--neon-cyan);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 4px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-cyan));
            border-radius: 2px;
            box-shadow: 0 0 10px var(--neon-pink);
            transition: 0.3s;
        }

        /* HERO */
        .hero {
            height: 100vh;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 0, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 255, 255, 0.3) 0%, transparent 50%),
                linear-gradient(135deg, var(--bg-dark) 0%, #1a0033 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .hero-content h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-cyan), var(--neon-yellow));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 2s ease infinite, neonPulse 1.5s ease-in-out infinite alternate;
            letter-spacing: 0.1em;
        }

        .hero-content p {
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            max-width: 600px;
            margin: 0 auto 2.5rem;
            opacity: 0.9;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-cyan));
            color: #000;
            padding: 1.2rem 3rem;
            text-decoration: none;
            border-radius: 50px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 
                0 0 30px rgba(255, 0, 255, 0.6),
                0 10px 30px rgba(0, 255, 255, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 0 50px rgba(255, 0, 255, 0.9),
                0 15px 40px rgba(0, 255, 255, 0.6);
        }

        /* SECTIONS */
        section {
            padding: 100px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        h2 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2.5rem, 6vw, 4rem);
            text-align: center;
            margin-bottom: 4rem;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: neonPulse 2s ease-in-out infinite alternate;
            letter-spacing: 0.05em;
        }

        /* ABOUT */
        .about {
            background: linear-gradient(135deg, rgba(26, 0, 51, 0.8) 0%, var(--bg-dark) 100%);
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .about-text h3 {
            font-family: 'Orbitron', monospace;
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            color: var(--neon-cyan);
            animation: neonPulse 2s ease-in-out infinite alternate;
        }

        .about-text p {
            font-size: 1.1rem;
            color: #ccc;
            margin-bottom: 1.5rem;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .feature {
            text-align: center;
            padding: 2rem;
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .feature:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.5);
            transform: translateY(-10px);
        }

        .feature i {
            font-size: 3.5rem;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            animation: neonPulse 2s ease-in-out infinite alternate;
        }

        .feature h4 {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #fff;
        }

        /* EVENTS */
        .events {
            background: linear-gradient(135deg, var(--neon-purple) 0%, var(--bg-dark) 50%);
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .event-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 0, 255, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .event-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan), var(--neon-yellow));
            transform: translateX(-100%);
            transition: transform 0.5s;
        }

        .event-card:hover::before {
            transform: translateX(100%);
        }

        .event-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(255, 0, 255, 0.3);
        }

        .event-date {
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-yellow));
            color: #000;
            padding: 0.6rem 1.2rem;
            border-radius: 25px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.6);
            animation: neonPulse 1.5s ease-in-out infinite alternate;
        }

        /* RESERVATION */
        .reservation {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a0033 100%);
        }

        .reservation-form {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(25px);
            padding: 3rem;
            border-radius: 25px;
            border: 2px solid rgba(255, 0, 255, 0.4);
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.3);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--neon-cyan);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid rgba(255, 0, 255, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* FOOTER */
        footer {
            background: #000;
            text-align: center;
            padding: 3rem 5% 1.5rem;
            border-top: 3px solid var(--neon-pink);
            box-shadow: 0 -10px 30px rgba(255, 0, 255, 0.3);
        }

        .social-links {
            margin-bottom: 2rem;
        }

        .social-links a {
            color: #fff;
            font-size: 1.8rem;
            margin: 0 1rem;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .social-links a:hover {
            color: var(--neon-cyan);
            transform: translateY(-3px) scale(1.2);
            text-shadow: 0 0 20px var(--neon-cyan);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            .nav-links {
                position: fixed;
                left: -100%;
                top: 70px;
                flex-direction: column;
                background: rgba(10, 10, 10, 0.98);
                width: 100%;
                text-align: center;
                padding: 2rem 0;
                transition: 0.3s;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            }

            .nav-links.active {
                left: 0;
            }

            .about-content {
                grid-template-columns: 1fr;
                gap: 2rem;
                text-align: center;
            }

            section {
                padding: 60px 5%;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <a href="#" class="logo">BAHAMAS</a>
            <ul class="nav-links">
                <li><a href="#accueil">Accueil</a></li>
                <li><a href="#about">À Propos</a></li>
                <li><a href="#events">Événements</a></li>
                <li><a href="#reservation">Réservation</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <!-- Hero -->
    <section id="accueil" class="hero">
        <div class="hero-content">
            <h1 class="neon-glow">BAHAMAS</h1>
            <p>L'expérience nocturne ultime dans l'esprit Vice City. Soirées exclusives, DJ légendaires et ambiance électrique.</p>
            <a href="#reservation" class="cta-button">Réserver VIP</a>
        </div>
    </section>

    <!-- About -->
    <section id="about" class="about">
        <h2 class="neon-glow">Pourquoi BAHAMAS ?</h2>
        <div class="about-content">
            <div class="about-text">
                <h3 class="neon-glow">Le Temple de la Nuit</h3>
                <p
