<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAHAMAS CLUB - Vice City Nights</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bebas+Neue&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        /* Neon Glow Effect */
        @keyframes neon-glow {
            0%, 100% { text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 40px #ff00ff; }
            50% { text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 80px #00ffff; }
        }

        .neon-text {
            animation: neon-glow 2s ease-in-out infinite alternate;
            font-family: 'Orbitron', monospace;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 2px solid #ff00ff;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.3);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            font-weight: 400;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
            text-decoration: none;
            letter-spacing: 3px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            position: relative;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .nav-links a:hover {
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
            transform: scale(1.1);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .hamburger span {
            width: 30px;
            height: 4px;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            margin: 3px 0;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
            transition: 0.3s;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.3) 0%, transparent 50%),
                linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #000 100%);
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><radialGradient id="g1" cx="50%" cy="50%"><stop offset="0%" stop-color="%23ff00ff" stop-opacity="0.1"/><stop offset="100%" stop-color="%23ff00ff" stop-opacity="0"/></radialGradient></defs><circle fill="url(%23g1)" cx="20" cy="20" r="15"/><circle fill="url(%23g1)" cx="80" cy="80" r="10"/><circle fill="url(%23g1)" cx="60" cy="30" r="8"/></svg>') repeat;
            animation: float 20s ease-in-out infinite;
            opacity: 0.3;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .hero-content h1 {
            font-family: 'Orbitron', monospace;
            font-size: 6rem;
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00, #ff6b35);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: neon-glow 1.5s ease-in-out infinite alternate, gradient-shift 3s ease infinite;
            text-shadow: 0 0 50px rgba(255, 0, 255, 0.8);
            letter-spacing: 5px;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hero-content p {
            font-size: 1.5rem;
            margin-bottom: 3rem;
            max-width: 700px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            animation: neon-glow 2s ease-in-out infinite alternate;
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            color: #000;
            padding: 1.2rem 3rem;
            text-decoration: none;
            border-radius: 50px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 20px rgba(255, 0, 255, 0.6),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 
                0 0 40px rgba(255, 0, 255, 1),
                0 0 60px rgba(0, 255, 255, 0.8);
        }

        /* Sections */
        section {
            padding: 120px 5%;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            text-align: center;
            margin-bottom: 4rem;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
            letter-spacing: 4px;
        }

        /* About */
        .about {
            background: linear-gradient(135deg, #1a0033 0%, #0a0a0a 100%);
            border-top: 1px solid rgba(255, 0, 255, 0.3);
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
            align-items: center;
        }

        .about-text h3 {
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
        }

        .about-text p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #ccc;
            line-height: 1.8;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .feature {
            text-align: center;
            padding: 2.5rem;
            background: rgba(255, 0, 255, 0.1);
            border: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 15px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .feature:hover {
            background: rgba(0, 255, 255, 0.2);
            border-color: #00ffff;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.5);
            transform: translateY(-10px);
        }

        .feature i {
            font-size: 4rem;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-shadow: none;
        }

        /* Events */
        .events {
            background: 
                radial-gradient(circle at 30% 30%, rgba(255, 0, 255, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(0, 255, 255, 0.2) 0%, transparent 50%),
                #000;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 2.5rem;
        }

        .event-card {
            background: linear-gradient(145deg, rgba(255, 0, 255, 0.15), rgba(0, 255, 255, 0.1));
            backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 25px;
            border: 2px solid transparent;
            background-clip: padding-box;
            position: relative;
            transition: all 0.4s ease;
            overflow: hidden;
        }

        .event-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .event-card:hover::before {
            transform: translateX(100%);
        }

        .event-card:hover {
            border-color: #ff00ff;
            box-shadow: 
                0 0 50px rgba(255, 0, 255, 0.6),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
            transform: translateY(-15px) scale(1.02);
        }

        .event-date {
            background: linear-gradient(45deg, #ff00ff, #ffff00);
            color: #000;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Reservation */
        .reservation {
            background: linear-gradient(135deg, #ff006e 0%, #8338ec 50%, #3a86ff 100%);
            position: relative;
            overflow: hidden;
        }

        .reservation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .reservation-form {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 1.2rem;
            border: 2px solid rgba(255, 0, 255, 0.3);
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        /* Footer */
        footer {
            background: #000;
            color: #fff;
            text-align: center;
            padding: 4rem 5% 2rem;
            border-top: 3px solid #ff00ff;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.3);
        }

        .social-links a {
            color: #fff;
            font-size: 2rem;
            margin: 0 1.5rem;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        .social-links a:hover {
            color: #00ffff;
            transform: scale(1.3) rotate(10deg);
            text-shadow: 0 0 25px #00ffff;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .nav-links {
                position: fixed;
                left: -100%;
                top: 80px;
                flex-direction: column;
                background: rgba(0,0,0,0.98);
                width: 100%;
                text-align: center;
                padding: 3rem 0;
                border-top: 2px solid #ff00ff;
            }
            .nav-links.active { left: 0; }

            .hero-content h1 { font-size: 3.5rem; }
            .about-content { grid-template-columns: 1fr; text-align: center; gap: 3rem; }
            section { padding: 80px 5%; }
            h2 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <a href="#" class="logo">BAHAMAS CLUB</a>
            <ul class="nav-links">
                <li><a href="#accueil">ACCUEIL</a></li>
                <li><a href="#about">À PROPOS</a></li>
                <li><a href="#events">ÉVÉ
